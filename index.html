<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Auctions - The Premier Marketplace</title>
    
    <!-- Google Fonts: Outfit for a modern, tech-forward feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Professional Validation & Form Styling */
        .pay-input:invalid { border: 1px solid #ff4d4d; }
        .error-text { color: #ff4d4d; font-size: 0.8rem; display: none; margin-top: -8px; margin-bottom: 10px; }
        
        .price-display-box {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid #d4af37;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .price-display-box h4 { margin: 0; color: #d4af37; font-size: 1.2rem; }
    </style>
</head>
<body>
    <!-- The main application container where views will be injected -->
    <div id="app"></div>

    <!-- Application Logic -->
    <script src="js/features.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
